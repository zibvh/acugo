<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Bixcart</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  /* ── Hero banner ── */
  .profile-hero {
    position: relative;
    background: var(--ink);
    height: 160px;
    overflow: hidden;
  }
  .profile-hero-img {
    width: 100%; height: 100%; object-fit: cover; display: block; opacity: .7;
  }
  .profile-hero-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.5));
  }

  /* ── Profile card ── */
  .profile-identity {
    max-width: 860px; margin: 0 auto;
    padding: 0 20px 0;
    position: relative;
  }
  .profile-avatar-ring {
    width: 88px; height: 88px; border-radius: 50%;
    border: 3.5px solid var(--surface);
    background: var(--surface-2);
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: var(--ink);
    margin-top: -44px; position: relative; z-index: 2; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  .profile-avatar-ring img { width: 100%; height: 100%; object-fit: cover; }

  .profile-top-row {
    display: flex; align-items: flex-end; gap: 16px; padding-top: 0; margin-top: 0;
    flex-wrap: wrap;
  }
  .profile-name-block { flex: 1; min-width: 0; padding-top: 8px; }
  .profile-full-name { font-size: 22px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 2px; }
  .profile-role-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
    padding: 3px 9px; border-radius: 20px;
  }
  .profile-role-badge.seller { background: rgba(200,82,42,.1); color: var(--accent); }
  .profile-role-badge.buyer  { background: rgba(59,130,246,.1); color: #2563eb; }
  .profile-university { font-size: 13px; color: var(--ink-3); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  .profile-bio { font-size: 13.5px; color: var(--ink-2); line-height: 1.65; margin-top: 10px; max-width: 560px; }

  /* ── Stat row ── */
  .profile-stats-row {
    display: flex; gap: 0; border-top: 1.5px solid var(--border);
    border-bottom: 1.5px solid var(--border); margin: 20px 0;
  }
  .profile-stat {
    flex: 1; text-align: center; padding: 14px 8px; position: relative;
  }
  .profile-stat + .profile-stat::before {
    content: ''; position: absolute; left: 0; top: 25%; height: 50%;
    width: 1px; background: var(--border);
  }
  .profile-stat-num  { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
  .profile-stat-label{ font-size: 11px; color: var(--ink-3); margin-top: 2px; }

  /* ── Sections ── */
  .profile-section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
    color: var(--ink-3); margin-bottom: 14px;
  }

  /* ── Review card ── */
  .review-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px;
  }
  .review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .review-avatar {
    width: 34px; height: 34px; border-radius: 50%; background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--ink); flex-shrink: 0; overflow: hidden;
  }
  .review-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .review-reviewer { font-size: 13px; font-weight: 600; }
  .review-date { font-size: 11px; color: var(--ink-3); }
  .review-stars { display: flex; gap: 2px; }
  .review-star { font-size: 14px; }
  .review-text { font-size: 13px; color: var(--ink-2); line-height: 1.6; margin-top: 6px; }

  /* ── Listings grid ── */
  .listings-mini-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .listing-mini-card {
    border-radius: var(--radius-lg); overflow: hidden;
    border: 1.5px solid var(--border); background: var(--surface);
    cursor: pointer; transition: box-shadow .15s, transform .12s;
    text-decoration: none; color: var(--ink); display: block;
  }
  .listing-mini-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .listing-mini-img {
    width: 100%; aspect-ratio: 1; background: var(--surface-2);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .listing-mini-img img { width: 100%; height: 100%; object-fit: cover; }
  .listing-mini-body { padding: 8px 10px; }
  .listing-mini-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .listing-mini-price { font-size: 12px; color: var(--accent); font-weight: 700; }
  .listing-mini-status { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; }

  /* ── Loading / error states ── */
  .profile-skeleton { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Responsive ── */
  .profile-body { max-width: 860px; margin: 0 auto; padding: 0 20px 48px; }
  @media (max-width: 600px) {
    .profile-hero { height: 120px; }
    .profile-avatar-ring { width: 72px; height: 72px; font-size: 22px; margin-top: -36px; }
    .profile-full-name { font-size: 18px; }
    .listings-mini-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    .profile-stat-num { font-size: 17px; }
  }
</style>
</head>
<body>

<nav class="navbar" id="main-nav"></nav>

<div class="profile-hero" id="profile-hero">
  <div class="profile-hero-gradient"></div>
</div>

<div class="profile-identity" id="profile-identity">
  <div class="profile-top-row">
    <div class="profile-avatar-ring" id="profile-avatar">
      <div class="profile-skeleton" style="width:100%;height:100%;background:var(--surface-2);border-radius:50%;"></div>
    </div>
    <div class="profile-name-block" id="profile-name-block">
      <div class="profile-skeleton" style="height:22px;width:180px;border-radius:8px;background:var(--surface-2);margin-bottom:8px;"></div>
      <div class="profile-skeleton" style="height:14px;width:120px;border-radius:6px;background:var(--surface-2);"></div>
    </div>
  </div>
</div>

<div class="profile-body" id="profile-body">
  <div class="profile-skeleton" style="height:72px;border-radius:12px;background:var(--surface-2);margin:24px 0 20px;"></div>
  <div class="profile-skeleton" style="height:200px;border-radius:12px;background:var(--surface-2);"></div>
</div>

<footer class="footer"></footer>
<script src="../js/app.js"></script>
<script>
  renderNav();
  renderFooter();

  const params  = new URLSearchParams(window.location.search);
  const userId  = params.get('id');

  if (!userId) {
    document.getElementById('profile-body').innerHTML = `
      <div style="padding:60px 20px;text-align:center;color:var(--ink-3);">
        <div style="font-size:40px;margin-bottom:12px;">🔍</div>
        <h2>No user specified</h2>
        <p>Go back and tap a user's name to view their profile.</p>
        <a href="marketplace.html" class="btn btn-primary" style="margin-top:16px;">Browse marketplace</a>
      </div>`;
  } else {
    loadProfile(userId);
  }

  async function loadProfile(id) {
    try {
      const u = await api.get(`/auth/users/${id}/profile`, false);
      renderProfile(u);
    } catch(e) {
      document.getElementById('profile-body').innerHTML = `
        <div style="padding:60px 20px;text-align:center;color:var(--ink-3);">
          <div style="font-size:40px;margin-bottom:12px;">😶</div>
          <h2>Profile not found</h2>
          <p>${e.message || 'This user may not exist or their account is inactive.'}</p>
          <button class="btn btn-ghost" onclick="history.back()">← Go back</button>
        </div>`;
    }
  }

  function renderProfile(u) {
    document.title = `${u.full_name} — Bixcart`;
    const isSeller = u.role === 'seller';
    const initials = u.full_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const joinYear = new Date(u.created_at).getFullYear();

    // Hero banner
    const hero = document.getElementById('profile-hero');
    if (u.banner_url) {
      hero.innerHTML = `<img class="profile-hero-img" src="${u.banner_url}" alt="">
        <div class="profile-hero-gradient"></div>`;
    } else {
      hero.style.background = isSeller
        ? 'linear-gradient(135deg, #c8522a 0%, #e8724a 100%)'
        : 'linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%)';
    }

    // Avatar
    const avatarEl = document.getElementById('profile-avatar');
    avatarEl.innerHTML = u.avatar_url
      ? `<img src="${u.avatar_url}" alt="${escHtml(u.full_name)}">`
      : initials;

    // Name block
    document.getElementById('profile-name-block').innerHTML = `
      <div class="profile-full-name">${escHtml(u.full_name)}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;">
        <span class="profile-role-badge ${u.role}">${isSeller ? '🏪 Seller' : '🛒 Buyer'}</span>
        ${u.is_verified ? `<span style="font-size:11px;background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:20px;font-weight:700;">✓ Verified</span>` : ''}
      </div>
      ${u.university ? `<div class="profile-university">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        ${escHtml(u.university)}
      </div>` : ''}
      ${u.bio ? `<div class="profile-bio">${escHtml(u.bio)}</div>` : ''}`;

    // Stats row
    const ratingDisplay = u.rating
      ? `<div>${'★'.repeat(Math.round(u.rating))}${'☆'.repeat(5 - Math.round(u.rating))}</div><div style="font-size:11px;color:var(--ink-3)">${u.rating.toFixed(1)} / 5</div>`
      : `<div style="font-size:13px;color:var(--ink-3)">—</div>`;

    let statsHTML = '';
    if (isSeller) {
      statsHTML = `
        <div class="profile-stat">
          <div class="profile-stat-num">${u.rating_count || 0}</div>
          <div class="profile-stat-label">Ratings</div>
        </div>
        <div class="profile-stat">
          <div style="color:#f59e0b;font-size:17px;font-weight:800;">${u.rating ? u.rating.toFixed(1) : '—'}</div>
          <div class="profile-stat-label">Avg rating</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${u.completed_sales || 0}</div>
          <div class="profile-stat-label">Sales</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${u.listings?.length || 0}</div>
          <div class="profile-stat-label">Listings</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${joinYear}</div>
          <div class="profile-stat-label">Joined</div>
        </div>`;
    } else {
      statsHTML = `
        <div class="profile-stat">
          <div class="profile-stat-num">${u.purchases || 0}</div>
          <div class="profile-stat-label">Purchases</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${u.reviews?.length || 0}</div>
          <div class="profile-stat-label">Reviews left</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${joinYear}</div>
          <div class="profile-stat-label">Joined</div>
        </div>`;
    }

    // Reviews
    const reviews = u.reviews || [];
    let reviewsHTML = '';
    if (reviews.length) {
      reviewsHTML = `
        <div style="margin-bottom:28px;">
          <div class="profile-section-title">Reviews (${reviews.length})</div>
          ${reviews.map(r => {
            const reviewer = isSeller
              ? (r.buyer_id?.full_name || 'Anonymous')
              : (r.listing_id?.title   || 'Item');
            const reviewerInitials = reviewer.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
            const avatarSrc = r.buyer_id?.avatar_url;
            const starsFilled = r.buyer_rating || 0;
            const starsHTML = Array.from({length:5}, (_,i) =>
              `<span class="review-star" style="color:${i<starsFilled?'#f59e0b':'#d1d5db'}">★</span>`
            ).join('');
            const dateStr = r.buyer_rated_at ? new Date(r.buyer_rated_at).toLocaleDateString('en-NG',{month:'short',year:'numeric'}) : '';
            return `
              <div class="review-card">
                <div class="review-header">
                  <div class="review-avatar">
                    ${avatarSrc ? `<img src="${avatarSrc}" alt="">` : reviewerInitials}
                  </div>
                  <div>
                    <div class="review-reviewer">${escHtml(reviewer)}</div>
                    <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
                      <div class="review-stars">${starsHTML}</div>
                      ${dateStr ? `<span class="review-date">${dateStr}</span>` : ''}
                    </div>
                  </div>
                </div>
                ${r.buyer_review ? `<div class="review-text">${escHtml(r.buyer_review)}</div>` : ''}
              </div>`;
          }).join('')}
        </div>`;
    } else {
      reviewsHTML = `
        <div style="margin-bottom:28px;">
          <div class="profile-section-title">Reviews</div>
          <div style="padding:24px;text-align:center;color:var(--ink-3);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);font-size:13px;">
            No reviews yet.
          </div>
        </div>`;
    }

    // Seller listings grid
    let listingsHTML = '';
    if (isSeller) {
      const activeListings = (u.listings || []).filter(l => l.status === 'active');
      if (activeListings.length) {
        listingsHTML = `
          <div style="margin-bottom:28px;">
            <div class="profile-section-title">Active listings (${activeListings.length})</div>
            <div class="listings-mini-grid">
              ${activeListings.map(l => `
                <a href="listing.html?id=${l._id || l.id}" class="listing-mini-card">
                  <div class="listing-mini-img">
                    ${l.images?.[0] ? `<img src="${l.images[0]}" alt="${escHtml(l.title)}">` : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--ink-3)"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`}
                  </div>
                  <div class="listing-mini-body">
                    <div class="listing-mini-title">${escHtml(l.title)}</div>
                    <div class="listing-mini-price">${formatPrice(l.price)}</div>
                  </div>
                </a>`).join('')}
            </div>
          </div>`;
      }
    }

    // Business name for seller
    const businessBadge = isSeller && u.business_name
      ? `<div style="font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:5px;margin-top:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          ${escHtml(u.business_name)}
        </div>`
      : '';

    // Inject business name into name block
    if (businessBadge) {
      document.getElementById('profile-name-block').insertAdjacentHTML('beforeend', businessBadge);
    }

    // Compose message CTA (only for logged-in users viewing someone else)
    const me = auth.getUser();
    const messageCTA = auth.isLoggedIn() && me?.id !== userId && me?.id !== u.id
      ? `<a href="messages.html" class="btn btn-primary btn-sm" style="display:inline-flex;align-items:center;gap:5px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          Message
        </a>`
      : '';

    // Render the whole body
    document.getElementById('profile-body').innerHTML = `
      ${messageCTA ? `<div style="margin:20px 0 0;display:flex;justify-content:flex-end;">${messageCTA}</div>` : ''}
      <div class="profile-stats-row">${statsHTML}</div>
      ${listingsHTML}
      ${reviewsHTML}`;
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
