<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing — Bixcart</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  .listing-layout { display: grid; grid-template-columns: 1fr 380px; gap: 36px; align-items: start; }
  .img-gallery { border-radius: var(--radius-xl); overflow: hidden; border: 1.5px solid var(--border); background: var(--surface-2); }
  .img-main {
    height: 420px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--surface-2) 0%, var(--border) 100%);
    color: var(--ink-3); position: relative;
  }
  .img-main img { width: 100%; height: 100%; object-fit: cover; }
  .img-thumbs { display: flex; gap: 8px; padding: 12px; background: var(--surface); border-top: 1.5px solid var(--border); }
  .img-thumb {
    width: 60px; height: 60px; border-radius: var(--radius-md);
    background: var(--surface-2); border: 2px solid transparent;
    cursor: pointer; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; color: var(--ink-3);
    transition: border-color .15s;
  }
  .img-thumb.active { border-color: var(--ink); }
  .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .sticky-card {
    position: sticky; top: calc(var(--nav-h) + 16px);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md);
  }
  .sticky-card-header { padding: 24px 24px 0; }
  .sticky-card-body { padding: 20px 24px 24px; }
  .price-display { font-family: var(--font-display); font-size: 42px; line-height: 1; color: var(--ink); }
  .price-orig { font-family: var(--font-body); font-size: 16px; color: var(--ink-3); text-decoration: line-through; margin-left: 8px; }
  .seller-card {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    background: var(--bg); border-radius: var(--radius-lg); margin-top: 16px;
    cursor: pointer; transition: background .15s;
  }
  .seller-card:hover { background: var(--surface-2); }
  .seller-info { flex: 1; min-width: 0; }
  .seller-name { font-size: 15px; font-weight: 700; }
  .seller-meta { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .detail-section { margin-bottom: 28px; }
  .detail-section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-3); margin-bottom: 12px; }
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-row-label { color: var(--ink-3); }
  .detail-row-val { font-weight: 600; }
  .related-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-3); margin-bottom: 24px; flex-wrap: wrap; }
  .breadcrumb a { color: var(--ink-3); transition: color .15s; }
  .breadcrumb a:hover { color: var(--ink); }
  .breadcrumb-sep { opacity: .4; display: flex; }
  .msg-modal-input { min-height: 90px; }
  .view-count { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--ink-3); }

  @media(max-width:900px) {
    .listing-layout { grid-template-columns: 1fr; }
    .sticky-card { position: static; }
    .related-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<nav class="nav"></nav>

<div class="page">
  <div class="container">

    <div id="page-content">
      <!-- skeleton -->
      <div class="listing-layout">
        <div>
          <div class="skeleton" style="height:36px;width:300px;margin-bottom:24px;border-radius:8px;"></div>
          <div class="skeleton" style="height:420px;border-radius:var(--radius-xl);"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="skeleton" style="height:48px;border-radius:8px;"></div>
          <div class="skeleton" style="height:200px;border-radius:var(--radius-xl);"></div>
          <div class="skeleton" style="height:120px;border-radius:var(--radius-xl);"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Message Modal -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Message seller</span>
      <button class="btn btn-ghost btn-icon-circle btn-sm" onclick="closeModal('msg-modal')" style="font-size:18px;line-height:1;">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="msg-listing-info" style="padding:12px;background:var(--bg);border-radius:var(--radius-md);margin-bottom:16px;font-size:13px;"></div>
      <div class="form-group">
        <label class="form-label">Your message</label>
        <textarea class="form-textarea msg-modal-input" id="msg-input" placeholder="Hi, I'm interested in this item. Is it still available?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('msg-modal')">Cancel</button>
      <button class="btn btn-primary" id="send-msg-btn">Send message</button>
    </div>
  </div>
</div>

<!-- Offer Modal -->
<div class="modal-overlay" id="offer-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Make an offer</span>
      <button class="btn btn-ghost btn-icon-circle btn-sm" onclick="closeModal('offer-modal')" style="font-size:18px;line-height:1;">&#x2715;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--ink-2);margin-bottom:16px;line-height:1.6;">Send your offer to the seller. They'll respond via messages if interested.</p>
      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label">Your offer (₦)</label>
        <input class="form-input" id="offer-amount" type="number" min="1" placeholder="Enter amount">
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <textarea class="form-textarea" id="offer-note" placeholder="Add any details about pickup, etc." style="min-height:70px;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('offer-modal')">Cancel</button>
      <button class="btn btn-accent" id="send-offer-btn">Send offer</button>
    </div>
  </div>
</div>

<footer class="footer"></footer>
<script src="../js/app.js"></script>
<script>
  renderNav();
  renderFooter();

  let listingData = null;

  function openModal(id) {
    document.getElementById(id).classList.add('open');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }
  window.closeModal = closeModal;

  // close on backdrop click
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  async function loadListing() {
    const id = getParam('id');
    if (!id) { window.location.href = 'marketplace.html'; return; }

    try {
      const listing = await api.get(`/listings/${id}`, true);
      listingData = listing;
      renderListing(listing);
    } catch(e) {
      document.getElementById('page-content').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">${icons.alertCircle}</div>
          <h3>Listing not found</h3>
          <p>${e.message}</p>
          <a href="marketplace.html" class="btn btn-primary">Back to marketplace</a>
        </div>`;
    }
  }

  function renderListing(l) {
    const user = auth.getUser();
    const isSeller = user?.id === l.seller_id;
    const discount = l.original_price ? Math.round((1 - l.price / l.original_price) * 100) : 0;

    document.title = `${l.title} — Bixcart`;

    const imgHTML = l.images?.length
      ? `<img src="${l.images[0]}" alt="${l.title}" id="main-img">`
      : `<div style="transform:scale(3);color:var(--ink-3);">${icons.package}</div>`;

    const thumbsHTML = l.images?.length > 1
      ? l.images.map((img, i) => `<div class="img-thumb ${i===0?'active':''}" onclick="switchImg(${i},'${img}',this)"><img src="${img}" alt=""></div>`).join('')
      : `<div class="img-thumb active" style="cursor:default;">${icons.package}</div>`;

    const condClass = { 'New': 'green', 'Like New': 'green', 'Good': 'amber', 'Fair': 'amber' }[l.condition] || 'surface';

    const ctaButtons = isSeller ? `
      <a href="sell.html?edit=${l.id}" class="btn btn-ghost w-full" style="display:flex;">${icons.edit} Edit listing</a>
    ` : (l.status !== 'active' ? `
      <button class="btn btn-surface w-full" disabled>${icons.package} ${l.status === 'sold' ? 'Item sold' : 'Not available'}</button>
    ` : `
      <button class="btn btn-accent btn-lg w-full" id="contact-btn" onclick="openMsgModal()">${icons.messageCircle} Contact seller</button>
      <button class="btn btn-ghost w-full" id="offer-btn" onclick="openOfferModal()">${icons.tag} Make an offer</button>
    `);

    document.getElementById('page-content').innerHTML = `
      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <a href="../index.html">Home</a>
        <span class="breadcrumb-sep">${icons.chevronRight}</span>
        <a href="marketplace.html">Marketplace</a>
        <span class="breadcrumb-sep">${icons.chevronRight}</span>
        <a href="marketplace.html?category=${encodeURIComponent(l.category)}">${l.category}</a>
        <span class="breadcrumb-sep">${icons.chevronRight}</span>
        <span style="color:var(--ink);font-weight:500;">${l.title.slice(0,40)}${l.title.length>40?'…':''}</span>
      </div>

      <div class="listing-layout">
        <!-- LEFT -->
        <div>
          <div class="img-gallery">
            <div class="img-main">${imgHTML}</div>
            <div class="img-thumbs">${thumbsHTML}</div>
          </div>

          <!-- Description -->
          <div class="detail-section" style="margin-top:32px;">
            <div class="detail-section-title">Description</div>
            <p style="font-size:15px;line-height:1.75;color:var(--ink-2);">${l.description}</p>
          </div>

          <!-- Details -->
          <div class="detail-section">
            <div class="detail-section-title">Item details</div>
            <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
              <div class="detail-row" style="padding:12px 16px;"><span class="detail-row-label">Condition</span><span class="detail-row-val"><span class="badge badge-${condClass}">${l.condition}</span></span></div>
              <div class="detail-row" style="padding:12px 16px;"><span class="detail-row-label">Category</span><span class="detail-row-val">${l.category}</span></div>
              <div class="detail-row" style="padding:12px 16px;"><span class="detail-row-label">Campus</span><span class="detail-row-val">${l.campus}</span></div>
              <div class="detail-row" style="padding:12px 16px;"><span class="detail-row-label">Listed</span><span class="detail-row-val">${formatDate(l.created_at)}</span></div>
              <div class="detail-row" style="padding:12px 16px;border-bottom:none;"><span class="detail-row-label">Views</span><span class="detail-row-val" style="display:flex;align-items:center;gap:5px;">${icons.eye} ${l.views}</span></div>
            </div>
          </div>

          <!-- Seller -->
          <div class="detail-section">
            <div class="detail-section-title">About the seller</div>
            <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;">
              <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">
                <a href="user-profile.html?id=${l.seller_id}" style="text-decoration:none;flex-shrink:0;">
                  <div class="avatar avatar-lg" style="background:var(--surface-2);font-size:22px;">${getInitials(l.seller_name)}</div>
                </a>
                <div>
                  <a href="user-profile.html?id=${l.seller_id}" style="text-decoration:none;color:inherit;">
                    <div style="font-size:17px;font-weight:700;">${l.seller_name}</div>
                  </a>
                  <div style="font-size:13px;color:var(--ink-3);margin-top:2px;">${l.seller_university}</div>
                  <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
                    ${stars(l.seller_rating)}
                    <span style="font-size:12px;color:var(--ink-3);">(${l.seller_rating_count} reviews)</span>
                    ${l.seller_verified ? `<span class="badge badge-green" style="font-size:10px;">${icons.check} Verified</span>` : ''}
                  </div>
                </div>
              </div>
              ${l.seller_bio ? `<p style="font-size:14px;color:var(--ink-2);line-height:1.6;padding-top:12px;border-top:1.5px solid var(--border);">${l.seller_bio}</p>` : ''}
              <div style="font-size:12px;color:var(--ink-3);margin-top:10px;display:flex;align-items:center;gap:4px;">${icons.mapPin} Member since ${new Date(l.seller_joined).toLocaleDateString('en-NG',{month:'long',year:'numeric'})}</div>
            </div>
          </div>
        </div>

        <!-- RIGHT (sticky) -->
        <div>
          <div class="sticky-card">
            <div class="sticky-card-header">
              <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
                <span class="price-display">${formatPrice(l.price)}</span>
                ${l.original_price ? `<span class="price-orig">${formatPrice(l.original_price)}</span>` : ''}
                ${discount >= 10 ? `<span class="badge badge-accent">-${discount}%</span>` : ''}
              </div>
              <div style="font-size:20px;font-weight:700;line-height:1.3;margin-bottom:10px;">${l.title}</div>
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
                <span class="badge badge-${condClass}">${l.condition}</span>
                ${statusBadge(l.status)}
                <span style="font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:3px;">${icons.mapPin} ${l.campus}</span>
              </div>
            </div>
            <div class="sticky-card-body">
              <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;" id="cta-buttons">
                ${ctaButtons}
              </div>

              <button class="btn btn-surface w-full" id="save-listing-btn" onclick="handleSave()" style="display:flex;">
                ${l.is_saved ? icons.heartFilled : icons.heart}
                <span id="save-label">${l.is_saved ? 'Saved' : 'Save listing'}</span>
              </button>

              <div class="divider"></div>

              <div style="display:flex;justify-content:space-between;align-items:center;">
                <button class="btn btn-ghost btn-sm" onclick="handleShare()" style="display:flex;gap:6px;">${icons.share} Share</button>
                <div class="view-count">${icons.eye} ${l.views} views · ${icons.heart} ${l.saves} saves</div>
              </div>
            </div>
          </div>

          <!-- Safety tip -->
          <div style="margin-top:16px;padding:14px 16px;background:var(--blue-bg);border:1.5px solid #c8dcf5;border-radius:var(--radius-lg);">
            <div style="display:flex;align-items:flex-start;gap:10px;">
              <span style="color:var(--blue);margin-top:1px;flex-shrink:0;">${icons.shield}</span>
              <div>
                <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px;">Safety tip</div>
                <p style="font-size:12px;color:var(--blue);opacity:.8;line-height:1.55;">Always meet in a public campus location. Never share financial information. Use the in-app payment system.</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Related listings -->
      ${l.related?.length ? `
      <div style="margin-top:60px;">
        <h3 style="font-family:var(--font-display);font-size:28px;letter-spacing:-0.5px;margin-bottom:24px;">More in ${l.category}</h3>
        <div class="related-grid">
          ${l.related.map(r => productCardHTML(r)).join('')}
        </div>
      </div>` : ''}
    `;
  }

  function switchImg(idx, src, el) {
    document.getElementById('main-img')?.remove();
    const main = document.querySelector('.img-main');
    const img = document.createElement('img');
    img.id = 'main-img'; img.src = src; img.alt = '';
    main.appendChild(img);
    document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
  window.switchImg = switchImg;

  function openMsgModal() {
    if (!auth.requireAuth()) return;
    document.getElementById('msg-listing-info').innerHTML = `<strong>${listingData?.title}</strong> · ${formatPrice(listingData?.price)}`;
    document.getElementById('msg-input').value = `Hi! I'm interested in your listing "${listingData?.title}". Is it still available?`;
    openModal('msg-modal');
  }
  window.openMsgModal = openMsgModal;

  function openOfferModal() {
    if (!auth.requireAuth()) return;
    document.getElementById('offer-amount').value = '';
    openModal('offer-modal');
  }
  window.openOfferModal = openOfferModal;

  document.getElementById('send-msg-btn').addEventListener('click', async () => {
    const content = document.getElementById('msg-input').value.trim();
    if (!content) { toast('Please enter a message', 'error'); return; }
    const btn = document.getElementById('send-msg-btn');
    btn.disabled = true; btn.innerHTML = icons.loader + ' Sending…';
    try {
      const r = await api.post('/messages/send', { receiver_id: listingData.seller_id, listing_id: listingData.id, content });
      closeModal('msg-modal');
      toast('Message sent!', 'success');
      setTimeout(() => window.location.href = `/pages/messages.html?conv=${r.conversation_id}`, 800);
    } catch(e) { toast(e.message, 'error'); btn.disabled = false; btn.textContent = 'Send message'; }
  });

  document.getElementById('send-offer-btn').addEventListener('click', async () => {
    const amount = document.getElementById('offer-amount').value;
    const note = document.getElementById('offer-note').value.trim();
    if (!amount || parseFloat(amount) <= 0) { toast('Enter a valid offer amount', 'error'); return; }
    const content = `I'd like to offer ₦${parseFloat(amount).toLocaleString('en-NG', {minimumFractionDigits: 0})} for "${listingData?.title}".${note ? ' ' + note : ''}`;
    try {
      await api.post('/messages/send', { receiver_id: listingData.seller_id, listing_id: listingData.id, content });
      closeModal('offer-modal');
      toast('Offer sent!', 'success');
    } catch(e) { toast(e.message, 'error'); }
  });

  async function handleSave() {
    if (!auth.requireAuth()) return;
    const id = getParam('id');
    try {
      const r = await api.post(`/listings/${id}/save`);
      const btn = document.getElementById('save-listing-btn');
      const label = document.getElementById('save-label');
      btn.querySelector('svg') && btn.querySelector('svg').replaceWith(Object.assign(document.createElement('span'), { innerHTML: r.saved ? icons.heartFilled : icons.heart }).firstChild);
      label.textContent = r.saved ? 'Saved' : 'Save listing';
      toast(r.saved ? 'Saved to wishlist' : 'Removed from wishlist', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
  window.handleSave = handleSave;

  function handleShare() {
    if (navigator.share) {
      navigator.share({ title: listingData?.title, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      toast('Link copied to clipboard', 'success');
    }
  }
  window.handleShare = handleShare;

  loadListing();
</script>
</body>
</html>
