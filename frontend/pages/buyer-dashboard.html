<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — Plazza</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  .dash-grid { display: grid; grid-template-columns: 240px 1fr; gap: 24px; align-items: start; }
  @media(max-width: 900px) {
    .dash-grid { grid-template-columns: 1fr; }
  }
  @media(max-width: 768px) {
    .order-card {
      flex-wrap: wrap;
      gap: 12px;
      padding: 14px;
    }
    /* Image + info side by side on top row */
    .order-img { width: 60px; height: 60px; }
    .order-info { flex: 1; min-width: 0; }
    /* Actions stretch full width below image+info */
    .order-actions {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      flex-wrap: wrap;
      gap: 8px;
    }
    .order-actions > div:first-child { font-size: 17px; }
  }

  @media(max-width: 600px) {
    .profile-stats { gap: 0; }
    .saved-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    /* Stack the whole card vertically */
    .order-card {
      flex-direction: column;
      gap: 10px;
    }
    /* Image + info side-by-side in top row */
    .order-card-top {
      display: flex;
      gap: 12px;
      width: 100%;
      align-items: flex-start;
    }
    .order-img { width: 56px; height: 56px; flex-shrink: 0; }
    .order-info { flex: 1; min-width: 0; }
    .order-title { white-space: normal; font-size: 14px; }
    /* Actions row: price on left, buttons on right */
    .order-actions {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      flex-shrink: unset;
      flex-wrap: wrap;
      gap: 6px;
    }
  }
  .profile-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px; text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .profile-avatar-wrap { position: relative; display: inline-block; margin-bottom: 14px; cursor: pointer; }
  .profile-avatar-wrap:hover .avatar-edit-overlay { opacity: 1; }
  .avatar-edit-overlay {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center;
    color: white; font-size: 10px; font-weight: 700; opacity: 0; transition: opacity .2s;
  }
  .profile-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--surface-2); display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: var(--ink-2); margin: 0 auto;
    border: 3px solid var(--border);
  }
  .verified-badge {
    position: absolute; bottom: 2px; right: 2px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--green); display: flex; align-items: center; justify-content: center;
    color: white; border: 2px solid var(--surface);
  }
  .profile-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
  .profile-uni { font-size: 13px; color: var(--ink-3); margin-bottom: 12px; }
  .profile-stats { display: flex; justify-content: space-around; padding: 14px 0; border-top: 1.5px solid var(--border); border-bottom: 1.5px solid var(--border); margin-bottom: 14px; }
  .profile-stat-num { font-size: 18px; font-weight: 700; }
  .profile-stat-label { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .order-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px; display: flex;
    align-items: flex-start; gap: 16px; transition: all .2s;
  }
  .order-card:hover { box-shadow: var(--shadow-md); }
  .order-img {
    width: 72px; height: 72px; border-radius: var(--radius-md);
    background: var(--surface-2); flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center; color: var(--ink-3);
  }
  .order-img img { width: 100%; height: 100%; object-fit: cover; }
  .order-info { flex: 1; min-width: 0; }
  .order-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-meta { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .order-card-top { display: flex; gap: 16px; flex: 1; min-width: 0; align-items: flex-start; }
  .order-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .saved-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

  /* Purchases tab header */
  .purchases-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; gap: 12px;
  }

  /* Scrollable filter tabs */
  .order-tabs-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;   /* Firefox */
    flex-shrink: 0;
  }
  .order-tabs-scroll::-webkit-scrollbar { display: none; }
  .order-tabs-scroll .tab-btn { white-space: nowrap; }

  @media (max-width: 600px) {
    /* Stack header vertically */
    .purchases-header {
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .purchases-header .btn { width: 100%; justify-content: center; }

    /* Tighter tab buttons */
    .order-tabs-scroll .tab-btn { padding: 8px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<nav class="nav"></nav>

<div class="page">
  <div class="container">
    <div class="dash-grid">

      <!-- SIDEBAR -->
      <aside>
        <div class="profile-card" id="profile-card">
          <div style="display:flex;flex-direction:column;align-items:center;">
            <div class="profile-avatar-wrap" onclick="document.getElementById('avatar-file-input').click()" title="Change profile photo">
              <div class="profile-avatar" id="p-avatar"></div>
              <div class="avatar-edit-overlay">Edit</div>
              <div class="verified-badge" id="p-verified" style="display:none;"></div>
              <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="uploadBuyerAvatar(this)">
            </div>
            <div class="profile-name" id="p-name">Loading…</div>
            <div class="profile-uni" id="p-uni"></div>
            <div id="p-stars" style="margin-bottom:12px;"></div>
          </div>
          <div class="profile-stats">
            <div><div class="profile-stat-num" id="p-purchases">—</div><div class="profile-stat-label">Purchases</div></div>
            <div><div class="profile-stat-num" id="p-saved">—</div><div class="profile-stat-label">Saved</div></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <button class="btn btn-surface btn-sm" id="notif-btn" onclick="handleNotifBtn()" title="Enable push notifications" style="display:none">🔔 Enable notifications</button>
            <button class="btn btn-ghost btn-sm" id="logout-btn" style="display:flex;color:var(--red);">Sign out</button>
          </div>
        </div>

        <div class="dash-sidebar" style="margin-top:14px;" id="dash-nav">
          <button class="dash-nav-item active" data-tab="purchases">
            <span id="nav-icon-purchases"></span> My Purchases
          </button>
          <button class="dash-nav-item" data-tab="saved">
            <span id="nav-icon-saved"></span> Saved Items
          </button>
          <button class="dash-nav-item" data-tab="messages">
            <span id="nav-icon-messages"></span> Messages
          </button>
          <div class="dash-nav-divider"></div>
          <button class="dash-nav-item" data-tab="settings">
            <span id="nav-icon-settings"></span> Account Settings
          </button>
        </div>
      </aside>

      <!-- MAIN -->
      <main>
        <!-- Purchases Tab -->
        <div id="tab-purchases" class="tab-content">
          <div class="purchases-header">
            <div>
              <h2 style="font-size:22px;font-weight:700;margin-bottom:2px;">My Purchases</h2>
              <p class="text-sm text-muted">Track your orders and transactions</p>
            </div>
            <a href="marketplace.html" class="btn btn-accent btn-sm" style="flex-shrink:0;">Browse listings</a>
          </div>

          <div class="tabs order-tabs-scroll" id="order-tabs">
            <button class="tab-btn active" data-status="all">All</button>
            <button class="tab-btn" data-status="pending">Pending</button>
            <button class="tab-btn" data-status="confirmed">Confirmed</button>
            <button class="tab-btn" data-status="completed">Completed</button>
            <button class="tab-btn" data-status="cancelled">Cancelled</button>
          </div>

          <div id="orders-list" style="display:flex;flex-direction:column;gap:12px;"></div>
        </div>

        <!-- Saved Tab -->
        <div id="tab-saved" class="tab-content" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <div>
              <h2 style="font-size:22px;font-weight:700;margin-bottom:2px;">Saved Items</h2>
              <p class="text-sm text-muted">Items you've bookmarked</p>
            </div>
          </div>
          <div class="saved-grid" id="saved-list"></div>
        </div>

        <!-- Messages Tab -->
        <div id="tab-messages" class="tab-content" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h2 style="font-size:22px;font-weight:700;">Messages</h2>
            <a href="messages.html" class="btn btn-primary btn-sm">Open full inbox</a>
          </div>
          <div id="convs-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" class="tab-content" style="display:none;">
          <div style="margin-bottom:24px;">
            <h2 style="font-size:22px;font-weight:700;margin-bottom:2px;">Account Settings</h2>
            <p class="text-sm text-muted">Manage your profile information</p>
          </div>
          <div class="card" style="padding:28px;max-width:560px;">
            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Full name</label>
              <input class="form-input" id="s-name" type="text">
            </div>
            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">Email address</label>
              <input class="form-input" id="s-email" type="email" disabled style="opacity:.6;">
              <span class="form-hint">Email cannot be changed</span>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
              <label class="form-label">University</label>
              <select class="form-select" id="s-university">
                <option value="UC Berkeley">UC Berkeley</option>
                <option value="Stanford University">Stanford University</option>
                <option value="UCLA">UCLA</option>
                <option value="NYU">New York University</option>
                <option value="MIT">MIT</option>
                <option value="Harvard University">Harvard University</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
              <label class="form-label">Bio</label>
              <textarea class="form-textarea" id="s-bio" placeholder="Tell other students about yourself…"></textarea>
            </div>
            <button class="btn btn-primary" id="save-profile-btn">Save changes</button>
          </div>
        </div>

      </main>
    </div>
  </div>
</div>

<footer class="footer"></footer>
<script src="../js/app.js"></script>
<script>
  if (!auth.requireAuth()) throw new Error('redirect');
  renderNav();
  renderFooter();

  // inject nav icons
  document.getElementById('nav-icon-purchases').innerHTML = icons.shoppingBag;
  document.getElementById('nav-icon-saved').innerHTML = icons.heart;
  document.getElementById('nav-icon-messages').innerHTML = icons.messageCircle;
  document.getElementById('nav-icon-settings').innerHTML = icons.settings;
  document.querySelector('[data-tab="messages"]').querySelector('span').nextSibling;

  // Fix sidebar logout icon
  document.querySelectorAll('.profile-card .btn').forEach(b => {
    if (b.textContent.includes('Sign out')) b.innerHTML = icons.logout + ' Sign out';
  });

  // Tab switching
  let currentTab = 'purchases';
  document.querySelectorAll('.dash-nav-item[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.dash-nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      document.getElementById(`tab-${currentTab}`).style.display = 'block';
      if (currentTab === 'saved') loadSaved();
      if (currentTab === 'messages') loadConversations();
      if (currentTab === 'settings') loadSettings();
    });
  });

  // Order status filter
  let orderStatusFilter = 'all';
  document.querySelectorAll('#order-tabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      orderStatusFilter = btn.dataset.status;
      document.querySelectorAll('#order-tabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    });
  });

  let allOrders = [];

  async function loadProfile() {
    try {
      const user = await api.get('/auth/me');
      const avatarEl = document.getElementById('p-avatar');
      if (user.avatar_url) {
        avatarEl.innerHTML = `<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatarEl.textContent = getInitials(user.full_name);
      }
      document.getElementById('p-name').textContent = user.full_name;
      document.getElementById('p-uni').textContent = user.university || 'Ajayi Crowther University';
      document.getElementById('p-stars').innerHTML = stars(user.rating, user.rating_count);
      if (user.is_verified) {
        const vb = document.getElementById('p-verified');
        vb.style.display = 'flex';
        vb.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
      }
    } catch(e) {}
  }

  async function uploadBuyerAvatar(input) {
    const file = input.files[0]; if (!file) return;
    toast('Uploading photo…', 'default');
    try {
      const formData = new FormData();
      formData.append('image', file);
      const res = await fetch('/api/uploads/image', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${auth.getToken()}` },
        body: formData,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      await api.put('/auth/profile', { avatar_url: data.url });
      document.getElementById('p-avatar').innerHTML = `<img src="${data.url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      const updated = await api.get('/auth/me');
      auth.save(auth.getToken(), updated);
      toast('Profile photo updated', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
  window.uploadBuyerAvatar = uploadBuyerAvatar;

  async function loadOrders() {
    document.getElementById('orders-list').innerHTML = Array(3).fill(0).map(() =>
      `<div class="card" style="padding:18px;display:flex;gap:16px;">
        <div class="skeleton" style="width:72px;height:72px;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
          <div class="skeleton" style="height:16px;width:60%;"></div>
          <div class="skeleton" style="height:13px;width:40%;"></div>
          <div class="skeleton" style="height:13px;width:30%;"></div>
        </div>
      </div>`).join('');
    try {
      allOrders = await api.get('/orders/buying');
      document.getElementById('p-purchases').textContent = allOrders.length;
      renderOrders();
    } catch(e) {
      document.getElementById('orders-list').innerHTML = `<div class="empty-state"><div class="empty-state-icon">${icons.shoppingBag}</div><h3>No purchases yet</h3><p>Start browsing the marketplace to find great deals.</p><a href="marketplace.html" class="btn btn-accent">Browse listings</a></div>`;
    }
  }

  function renderOrders() {
    const filtered = orderStatusFilter === 'all' ? allOrders : allOrders.filter(o => o.status === orderStatusFilter);
    const el = document.getElementById('orders-list');
    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${icons.package}</div><h3>No ${orderStatusFilter === 'all' ? '' : orderStatusFilter} orders</h3><p>Your ${orderStatusFilter === 'all' ? '' : orderStatusFilter + ' '}orders will appear here.</p></div>`;
      return;
    }
    el.innerHTML = filtered.map(o => `
      <div class="order-card">
        <div class="order-card-top">
          <div class="order-img">
            ${o.listing_images?.[0] ? `<img src="${o.listing_images[0]}" alt="">` : icons.package}
          </div>
          <div class="order-info">
            <div class="order-title">${o.listing_title}</div>
            <div class="order-meta">
              ${statusBadge(o.status)}
              <span style="display:flex;align-items:center;gap:4px;">${icons.user} ${o.seller_name}</span>
              <span>${formatDate(o.created_at)}</span>
            </div>
            ${o.meetup_location ? `<div style="font-size:12px;color:var(--ink-3);margin-top:6px;display:flex;align-items:center;gap:4px;">${icons.mapPin} Meetup: ${o.meetup_location}</div>` : ''}
          </div>
        </div>
        <div class="order-actions">
          <div style="font-size:18px;font-weight:700;">${formatCurrency(o.amount)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <a href="listing.html?id=${o.listing_id}" class="btn btn-ghost btn-sm">View listing</a>
            ${o.status === 'pending' ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder('${o.id}')">Cancel</button>` : ''}
          </div>
        </div>
      </div>`).join('');
  }

  window.cancelOrder = async (id) => {
    if (!confirm('Cancel this order? The listing will become available again.')) return;
    try {
      await api.put(`/orders/${id}/status`, { status: 'cancelled' });
      toast('Order cancelled', 'success');
      loadOrders();
    } catch(e) { toast(e.message, 'error'); }
  };

  async function loadSaved() {
    const el = document.getElementById('saved-list');
    el.innerHTML = Array(4).fill(0).map(() => `<div class="skeleton" style="height:280px;border-radius:var(--radius-xl);"></div>`).join('');
    try {
      const saved = await api.get('/orders/saved');
      document.getElementById('p-saved').textContent = saved.length;
      if (!saved.length) {
        el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">${icons.heart}</div><h3>No saved items</h3><p>Tap the heart on any listing to save it here.</p><a href="marketplace.html" class="btn btn-accent">Browse listings</a></div>`;
        return;
      }
      el.innerHTML = saved.map(l => productCardHTML(l, true)).join('');
    } catch(e) { el.innerHTML = `<p class="text-muted">${e.message}</p>`; }
  }

  async function loadConversations() {
    const el = document.getElementById('convs-list');
    el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--ink-3);">${icons.loader} Loading messages…</div>`;
    try {
      const convs = await api.get('/messages/conversations');
      if (!convs.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${icons.messageCircle}</div><h3>No messages yet</h3><p>Contact a seller to start a conversation.</p></div>`;
        return;
      }
      el.innerHTML = convs.slice(0, 5).map(c => `
        <a href="messages.html?conv=${c.id}" style="display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);text-decoration:none;transition:all .2s;" class="card-hover">
          <div class="avatar avatar-md" style="background:var(--surface-2);">${getInitials(c.other_user.name)}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:${c.unread_count > 0 ? '700' : '600'};margin-bottom:2px;">${c.other_user.name}</div>
            <div style="font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.last_message || 'No messages yet'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div style="font-size:11px;color:var(--ink-3);">${formatDate(c.last_message_at)}</div>
            ${c.unread_count > 0 ? `<span class="badge badge-accent">${c.unread_count}</span>` : ''}
          </div>
        </a>`).join('');
      if (convs.length > 5) el.innerHTML += `<a href="messages.html" class="btn btn-ghost w-full" style="display:flex;justify-content:center;">View all ${convs.length} conversations</a>`;
    } catch(e) { el.innerHTML = `<p class="text-muted">${e.message}</p>`; }
  }

  async function loadSettings() {
    try {
      const user = await api.get('/auth/me');
      document.getElementById('s-name').value = user.full_name;
      document.getElementById('s-email').value = user.email;
      document.getElementById('s-university').value = user.university;
      document.getElementById('s-bio').value = user.bio || '';
    } catch(e) {}
  }

  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true; btn.innerHTML = icons.loader + ' Saving…';
    try {
      await api.put('/auth/profile', {
        full_name: document.getElementById('s-name').value,
        university: document.getElementById('s-university').value,
        bio: document.getElementById('s-bio').value,
      });
      toast('Profile updated!', 'success');
      loadProfile();
    } catch(e) { toast(e.message, 'error'); }
    btn.disabled = false; btn.innerHTML = icons.check + ' Save changes';
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    auth.clear();
    window.location.href = '/';
  });

  async function handleNotifBtn() {
    const ok = await requestPushPermission();
    if (ok) {
      document.getElementById('notif-btn').style.display = 'none';
      toast('Notifications enabled! You\'ll be notified for new messages.', 'success');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('notif-btn');
    if (!btn) return;
    if (pushManager.canPush() && !pushManager.alreadyGranted()) {
      btn.style.display = 'flex';
    }
  });

  loadProfile();
  loadOrders();
</script>
</body>
</html>
